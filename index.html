<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISPRS 2026 Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --navy-dark: #0a192f; --navy-mid: #112240; --navy-light: #233554;
            --gold: #D4AF37; --gold-hover: #f1c40f; --text-main: #e6f1ff; --text-dim: #8892b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--navy-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { background: var(--navy-mid); padding: 1rem; border-bottom: 3px solid var(--gold); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        header h1 { font-size: 1.1rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        #sync-status { font-size: 0.7rem; margin-top: 5px; color: var(--text-dim); }

        /* Chips */
        .chips-wrapper { padding: 10px; display: flex; gap: 8px; overflow-x: auto; background: var(--navy-dark); scrollbar-width: none; }
        .chips-wrapper::-webkit-scrollbar { display: none; }
        .chip { background: var(--navy-light); border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .chip:hover { background: var(--gold); color: var(--navy-dark); }

        /* Chat Area */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
        .bot { align-self: flex-start; background: var(--navy-light); border-bottom-left-radius: 2px; border: 1px solid rgba(212,175,55,0.3); }
        .user { align-self: flex-end; background: var(--gold); color: var(--navy-dark); border-bottom-right-radius: 2px; font-weight: 500; }

        /* Loading Animation */
        .typing { display: none; padding: 10px 20px; color: var(--gold); font-size: 0.8rem; }
        .dot { animation: blink 1s infinite; margin: 0 2px; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Input */
        .input-container { background: var(--navy-mid); padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--navy-light); }
        input { flex: 1; background: var(--navy-dark); border: 1px solid var(--navy-light); padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: var(--navy-dark); font-size: 1.1rem; }
        
        strong { color: var(--gold); }
        .small-txt { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <header>
        <h1 id="event-name">ISPRS Congress 2026</h1>
        <div id="sync-status"><i class="fa-solid fa-circle-notch fa-spin"></i> Initializing...</div>
    </header>

    <div class="chips-wrapper">
        <div class="chip" onclick="quick('Schedule')">📅 Schedule</div>
        <div class="chip" onclick="quick('WiFi')">📶 WiFi</div>
        <div class="chip" onclick="quick('Speakers')">🎤 Speakers</div>
        <div class="chip" onclick="quick('Exhibitors')">🏢 Exhibitors</div>
        <div class="chip" onclick="quick('Social')">🥂 Social</div>
        <div class="chip" onclick="quick('Hotels')">🏨 Hotels</div>
    </div>

    <div id="chat-box">
        <div class="msg bot">Welcome! I'm syncing with the latest conference data. How can I assist you?</div>
    </div>

    <div id="typing" class="typing">Assistant is searching the database<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>

    <div class="input-container">
        <input type="text" id="user-in" placeholder="Ask about sessions, speakers, or rooms..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

<script>
    let DB = {};

    // 1. DATA SYNC - FETCHES THE JSON GENERATED BY POWER AUTOMATE
    async function syncData() {
        const status = document.getElementById('sync-status');
        try {
            const res = await fetch('data.json');
            if(!res.ok) throw new Error();
            DB = await res.json();
            
            // Set Event Name from Info Tab
            const eventInfo = DB.Info.find(i => i.Field === "Event Full Name");
            if(eventInfo) document.getElementById('event-name').innerText = eventInfo.Value;
            
            status.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#2ecc71"></i> Live Sync Active';
        } catch (e) {
            status.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="color:#e74c3c"></i> Offline Mode';
            console.error("Data sync failed. Ensure data.json exists.");
        }
    }

    // 2. SEARCH LOGIC
    function getResponse(q) {
        q = q.toLowerCase();

        // A. Search FAQs (Priority 1)
        const faq = DB.FAQs?.find(f => q.includes(f.Question.toLowerCase()) || q.includes(f.Category.toLowerCase()));
        if(faq) return `<strong>${faq.Question}</strong><br>${faq.Answer}`;

        // B. Search Agenda (Sessions/Tracks/Rooms)
        const session = DB.Agenda_Sessions?.find(s => 
            q.includes(s.Session_Title.toLowerCase()) || 
            q.includes(s.Track.toLowerCase()) || 
            (s.Speaker_Names && q.includes(s.Speaker_Names.toLowerCase()))
        );
        if(session) return `<strong>Session Found:</strong><br>📅 ${session.Date} | ${session.Start_Time}<br>📍 Room: ${session.Room}<br>🎤 ${session.Speaker_Names}<br>📝 ${session.Description}`;

        // C. Search Speakers
        const spk = DB.Speakers?.find(s => q.includes(s.Full_Name.toLowerCase()));
        if(spk) return `<strong>Speaker: ${spk.Full_Name}</strong><br>🎓 ${spk.Organization}<br>🎤 Session: ${spk.Session_Title}<br>📍 ${spk.Room} at ${spk.Session_Time}`;

        // D. Search Exhibitors
        const exh = DB.Exhibitors_Sponsors?.find(e => q.includes(e.Company_Name.toLowerCase()));
        if(exh) return `<strong>${exh.Company_Name}</strong> (${exh.Sponsorship_Tier})<br>📍 Booth: ${exh.Booth_Number}<br>🏢 ${exh.Hall_Zone}<br>🔗 ${exh.Website}`;

        // E. Search Venue/Rooms
        const room = DB.Venue_Rooms?.find(r => q.includes(r.Room_Name.toLowerCase()));
        if(room) return `<strong>Room: ${room.Room_Name}</strong><br>🏢 ${room.Floor_Level}<br>👥 Capacity: ${room.Capacity}<br>♿ ${room.Accessibility}`;

        // F. Search Social
        const soc = DB.Social_Events?.find(s => q.includes(s.Event_Name.toLowerCase()) || q.includes('social') || q.includes('party'));
        if(soc) return `<strong>${soc.Event_Name}</strong><br>📅 ${soc.Date}, ${soc.Start_Time}<br>📍 ${soc.Location}<br>👔 ${soc.Dress_Code}`;

        // G. Search Transport/Hotels
        const stay = DB.Transport_Hotels?.find(t => q.includes(t.Name.toLowerCase()) || q.includes('hotel') || q.includes('airport') || q.includes('taxi'));
        if(stay) return `<strong>${stay.Name}</strong> (${stay.Type})<br>📍 ${stay.Address}<br>🚶 ${stay.Distance_to_Venue}<br>ℹ️ ${stay.Notes}`;

        return "I couldn't find a specific match. Please try a different keyword or visit the **Registration Desk** in the Main Lobby for assistance.";
    }

    // 3. UI FUNCTIONS
    function send() {
        const input = document.getElementById('user-in');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';
        document.getElementById('typing').style.display = 'block';

        setTimeout(() => {
            document.getElementById('typing').style.display = 'none';
            addMsg(getResponse(text), 'bot');
        }, 700);
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function quick(t) { document.getElementById('user-in').value = t; send(); }

    syncData();
</script>
</body>
</html>
