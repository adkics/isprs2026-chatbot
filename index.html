<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISPRS 2026 | AI Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0f172a; --gold: #fbbf24; --slate: #1e293b; --white: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--navy); color: var(--white); height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 20px; border-bottom: 3px solid var(--gold); background: var(--slate); text-align: center; }
        header h1 { font-size: 1.2rem; color: var(--gold); text-transform: uppercase; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #0f172a; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
        .bot { align-self: flex-start; background: var(--slate); border: 1px solid rgba(251, 191, 36, 0.2); }
        .user { align-self: flex-end; background: var(--gold); color: var(--navy); font-weight: 600; }

        .input-area { padding: 20px; background: var(--slate); display: flex; gap: 10px; border-top: 1px solid var(--gold); }
        input { flex:1; background: var(--navy); border: 1px solid #475569; padding: 12px; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); border: none; width: 50px; border-radius: 8px; cursor: pointer; color: var(--navy); }
        
        #loading { display: none; color: var(--gold); font-size: 0.8rem; padding: 0 20px 10px; font-style: italic; }
    </style>
</head>
<body>

<header><h1>XXV ISPRS CONGRESS 2026</h1></header>

<div id="chat-window">
    <div class="msg bot">Hello. I am the ISPRS 2026 AI Assistant. I have been trained on the conference database. How can I help you?</div>
</div>
<div id="loading">AI is thinking...</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') askAI()">
    <button onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // --- PUT YOUR CLOUDFLARE WORKER URL HERE ---
    const WORKER_URL = "https://isprs-ai-brain.arjun-e9d.workers.dev/"; 

    async function askAI() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        appendMsg(text, 'user');
        input.value = '';
        document.getElementById('loading').style.display = 'block';

        try {
            const r = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const d = await r.json();
            appendMsg(d.reply, 'bot');
        } catch (e) {
            appendMsg("Error: Could not connect to the AI brain. Make sure your Worker URL is correct.", 'bot');
        }
        document.getElementById('loading').style.display = 'none';
    }

    function appendMsg(t, c) {
        const w = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerText = t;
        w.appendChild(d);
        w.scrollTop = w.scrollHeight;
    }
</script>
</body>
</html>
