<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISPRS 2026 | AI Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0f172a; --gold: #D4AF37; --slate: #1e293b; --white: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--navy); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 25px; border-bottom: 2px solid var(--gold); background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); text-align: center; }
        header h1 { font-size: 1.1rem; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
        .bot { align-self: flex-start; background: var(--slate); border: 1px solid rgba(212, 175, 55, 0.3); }
        .user { align-self: flex-end; background: var(--gold); color: var(--navy); font-weight: 600; }

        .input-container { padding: 20px; background: var(--slate); display: flex; gap: 10px; }
        input { flex:1; background: var(--navy); border: 1px solid var(--gold); padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { background: var(--gold); border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; color: var(--navy); font-weight: bold; }
        
        .dots { font-style: italic; color: var(--gold); font-size: 0.8rem; padding-left: 20px; display: none; }
    </style>
</head>
<body>

<header><h1>XXV ISPRS CONGRESS 2026</h1></header>

<div id="chat-window">
    <div class="msg bot">Welcome. I am the official ISPRS 2026 AI Assistant. How may I help you today?</div>
</div>
<div id="loading" class="dots">AI is thinking...</div>

<div class="input-container">
    <input type="text" id="user-input" placeholder="Ask about the agenda, speakers, or WiFi..." onkeypress="if(event.key==='Enter') askAI()">
    <button onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // REPLACE THIS WITH YOUR CLOUDFLARE WORKER URL
    const WORKER_URL = "https://isprs-ai-brain.YOURNAME.workers.dev";

    async function askAI() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        appendMsg(text, 'user');
        input.value = '';
        document.getElementById('loading').style.display = 'block';

        try {
            const r = await fetch(WORKER_URL, {
                method: "POST",
                body: JSON.stringify({ message: text })
            });
            const d = await r.json();
            appendMsg(d.reply, 'bot');
        } catch (e) {
            appendMsg("I apologize, but I am unable to connect to the server.", 'bot');
        }
        document.getElementById('loading').style.display = 'none';
    }

    function appendMsg(t, c) {
        const w = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerText = t;
        w.appendChild(d);
        w.scrollTop = w.scrollHeight;
    }
</script>
</body>
</html>
