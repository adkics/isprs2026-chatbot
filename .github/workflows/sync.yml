name: Sync Data
on:
  repository_dispatch:
    types: [excel_update]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Update data.json
        run: |
          cat << 'EOF' > data.json
          ${{ toJson(github.event.client_payload) }}
          EOF
      - name: Commit and Push
        run: |
          git config --global user.name 'DataBot'
          git config --global user.email 'bot@isprs.org'
          git add data.json
          git commit -m "Data update from Excel" || exit 0
          git push
